<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image/Text Extraction</title>
    <style>
        /* General page styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            background-image: url(/static/image/4thpageimage.jpg);
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Header styling */
        h1 {
            color: #333;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Form styling */
        form {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            position: relative; /* Positioning for the buttons */
        }

        /* Label and input styling */
        label {
            font-size: 16px;
            margin-bottom: 8px;
            display: inline-block;
            color: #555;
        }

        input[type="file"] {
            margin-bottom: 10px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Button container styling */
        .button-container {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px; /* Add space between buttons */
            width: 100%;
            max-width: 600px;
        }

        /* Button styling */
        button {
            border-radius: 4px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            flex-grow: 1; /* Allow buttons to grow equally */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .extract-button {
            background-color: #007bff;
            font-weight: bold;
            color: #fff;
            border: none;
        }

        .extract-button:hover {
            background-color: #0056b3;
        }

        .back-button {
            display: none;
            background-color: #a53b3b;
            font-weight: bold;
            color: white;
            border: none;
        }

        .back-button:hover {
            background-color: #f40101;
        }

        /* New "Insert Values" button */
        .insert-btn {
            display: none;
            background-color: #54bbcf;
            font-weight: bold;
            color: white;
            border: none;
        }

        .insert-btn:hover {
            background-color: #b2da21;
        }

        /* Extracted text styling */
        h2 {
            margin-top: 20px;
            color: #333;
        }

        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            overflow-x: auto;
            text-align: left;
            max-width: 100%;
            word-wrap: break-word;
        }
    </style>
    <script>
        function showButtons() {
            document.getElementById("backButton").style.display = "inline-block";
            document.getElementById("insertButton").style.display = "inline-block";
        }
    </script>
</head>
<body>
    <h1>Upload an Image or PDF for Text Extraction</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <label for="file">Choose a file (image or PDF):</label>
        <input type="file" id="file" name="file" accept="image/*,.pdf" required>
        <br><br>
        <div class="button-container">
            <button type="submit" class="extract-button">Extract Text</button>
            <button id="backButton" class="back-button" onclick="window.location.href='/'">Back</button>
            <button id="insertButton" class="insert-btn" onclick="window.location.href='/index'">Insert Values</button>
        </div>
    </form>
    
    {% if text %}
    <h2>Extracted Text:</h2>
    <pre style="background-color: #f4f4f4; padding: 10px; border: 1px solid #ddd;">{{ text }}</pre>
    <script>
        showButtons();
    </script>
    {% endif %}
</body>
</html>
