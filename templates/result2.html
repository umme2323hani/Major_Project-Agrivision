<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendations</title>
    <style>
        /* Basic page setup */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('/static/image/3rdpageimage.jpg'); /* Background image */
            background-size: cover; /* Make sure the image covers the full page */
            background-position: center; /* Center the image */
            background-repeat: no-repeat; /* Don't repeat the image */
        }

        /* Container for the result */
        .container {
            background-color: rgb(202, 198, 198);
            opacity: 90% ;
            border-radius: 12px;
            box-shadow: 0 8px 20px #e6dada1a;
            padding: 40px;
            width: 85%;
            max-width: 650px;
            text-align: center;
            font-size: 1.1rem;
            position: relative;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            color: #4caf50;
            font-weight: 600;
        }

        h2 {
            font-size: 1.5rem;
            color: #16a085;
            margin-bottom: 15px;
        }

        .yield {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        ul {
            list-style-type: none;
            padding: 0;
            font-size: 1.2rem;
            margin: 20px 0;
        }

        li {
            background-color: #ecf0f1;
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            color: #34495e;
        }

        li:hover {
            background-color: #bdc3c7;
            cursor: pointer;
        }

/* Button styling */
.button {
    text-decoration: none;
    background-color: #dc3545; /* Red color */
    color: white;
    padding: 12px 24px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
    font-size: 0.8rem;
    position: absolute;
    bottom: 5px;
    left: 20px;
    border: none; /* Remove default border */
    cursor: pointer; /* Pointer cursor */
}

.button:hover {
    background-color: #c82333;
}

.button:focus {
    outline: none;
    background-color: #c82333;
}


        /* Media Queries for responsiveness */
        @media (max-width: 768px) {
            .container {
                width: 90%;
                padding: 25px;
            }

            h1 {
                font-size: 2.5rem;
            }

            a {
                font-size: 2.2rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Predicted Crop: {{ predicted_crop }}</h1>
        <p class="yield">Yield Per Acre: {{ yield_per_acre }}</p>
        <h2>Recommended Crops for Similar Conditions:</h2>
        <ul>
            {% for crop in recommendations %}
                <li>{{ crop }}</li>
            {% endfor %}
        </ul>
        <button class="button" onclick="window.history.back()">Back</button>
    </div>
</body>
</html>
