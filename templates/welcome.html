<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriVision: Smart Farming Solutions</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Align heading at the top and button at the bottom */
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('/static/image/agrivision1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f0f8ff;
        }
        h1 {
            font-size: 2.5rem;
            font-family: 'Courier New', Courier, monospace;
            color: #060606;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin: 20px 0;
            border: 2px solid #060606;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.8);
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            color: #0c0909;
            background-color: #bbcf54;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            position: relative; /* Needed for pseudo-element */
        }
        .btn::after {
            content: "→"; /* Arrow symbol */
            font-size: 1.2rem;
            margin-left: 10px; /* Adds space between the text and arrow */
            transition: transform 0.2s ease;
        }
        .btn:hover {
            background-color: #23bbe1;
            transform: scale(1.05); /* Slightly enlarges the button on hover */
        }
        .btn:hover::after {
            transform: translateX(5px); /* Moves the arrow slightly to the right on hover */
        }
    </style>
</head>
<body>
    <h1>AgriVision: Smart Farming Solutions</h1>
    <a href="/textextraction" class="btn">Explore Smart Solutions</a>
</body>
</html>
